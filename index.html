<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trainova</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Hero Section -->
    <section class="hero-section">
      <header class="header">
        <img src="./images/logo.svg" alt="logo" />
        <nav class="navbar">
          <ul class="nav-list">
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contacts">Contacts</a></li>
          </ul>
        </nav>
        <button class="btn btn-primary">Join Now</button>
      </header>

      <div class="hero-content">
        <h1>Build Your <span class="secondary-text">Strength.</span></h1>
        <p>Train with expert coaches, modern equipment, and a supportive community dedicated to helping you reach your fitness goals.</p>
        <div class="hero-buttons">
          <button class="btn btn-primary">Join Now</button>
          <button class="btn btn-secondary">View Plans</button>
        </div>
      </div>

      <div class="hero-rectangle">
        <div class="members">Members</div>
        <div class="trainers">Members</div>
        <div class="programs">Members</div>
        <div class="years">Members</div>
      </div>
    </section>
  </body>
</html>
